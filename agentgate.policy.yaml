version: 1
defaultDecision: block
agents:
  coding-agent:
    description: AI coding agent that proposes repository changes.
rules:
  - id: allow-low-risk-pr-actions
    description: Allow low-risk pull request creation and updates.
    effect: allow
    agents:
      - coding-agent
    integrations:
      - github
    actions:
      - pull_requests.create
      - pull_requests.update
    resources:
      - risk:low
  - id: require-approval-high-risk-code-changes
    description: Require Slack approval before landing high-risk repository changes.
    effect: approval_required
    agents:
      - coding-agent
    integrations:
      - github
    actions:
      - pull_requests.create
      - pull_requests.update
      - pull_requests.merge
    resources:
      - risk:high
  - id: block-forbidden-code-changes
    description: Block direct pushes, secret changes, and protected workflow bypasses.
    effect: block
    agents:
      - coding-agent
    integrations:
      - github
    actions:
      - branches.push_direct
      - secrets.update
      - checks.bypass
approval:
  provider: slack
  timeoutSeconds: 900
  channel: "#code-review-approvals"
